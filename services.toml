# Background services managed by the bootstrap service manager.
# Each [services.<name>] entry runs in its own tmux window (named svc-<name>).
# See the edit-services skill for details.

# On startup, rebuild the frontend bundle if its sources changed since the last
# build (a no-op for backend-only changes), then serve. This is the reveal step
# of the update-system-interface flow: a single `mngr start --restart
# system-services` picks up both merged backend (.py) and frontend changes. The
# build helper is best-effort (exits 0 even on failure) so the server always
# starts.
[services.system_interface]
command = "python3 scripts/forward_port.py --url http://localhost:8000 --name system_interface && python3 scripts/build_frontend_if_changed.py && system-interface"
restart = "on-failure"

[services.web]
command = "python3 scripts/forward_port.py --url http://localhost:8080 --name web && uv run web-server"
restart = "on-failure"

[services.cloudflared]
command = "uv run cloudflare-tunnel"
restart = "on-failure"

[services.app-watcher]
command = "uv run app-watcher"
restart = "on-failure"

# Periodically commits + pushes runtime/ to mindsbackup/$MNGR_AGENT_ID so that
# Claude memory, ticket state, transcripts, telegram history, etc. survive
# container loss. The worktree itself (and the orphan branch) are created
# by bootstrap before this service starts. See libs/runtime_backup/README.md.
[services.runtime-backup]
command = "uv run runtime-backup"
restart = "on-failure"

# Continuous restic-based backup of the full host_dir (/mngr/) to a remote
# repository (Cloudflare R2 by default). Distinct from runtime-backup: this
# captures the entire workspace state (code, worktrees, agent state) on an
# hourly cadence to an encrypted off-site repo. Configured via
# runtime/backup.toml + runtime/secrets/restic.env, both seeded by bootstrap
# on first boot. See libs/host_backup/README.md.
[services.host-backup]
command = "uv run host-backup"
restart = "on-failure"

# Idempotently installs deferred packages on first container boot
# (currently just Playwright + Chromium + its apt system libs). Skips
# work when /var/lib/minds/deferred-install/done.<package> is present,
# so this is fast on every restart after the first. See
# scripts/deferred_install.sh and libs/bootstrap/README.md.
[services.deferred-install]
command = "bash scripts/deferred_install.sh"
